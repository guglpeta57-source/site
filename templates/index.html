<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учебный бот</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Подключаем KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js"
            onload="renderMathInElement(document.body);"></script>
</head>
<body>
    <!-- Модальное окно для входа/регистрации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="authTitle">Вход</h2>
            <input type="text" id="usernameInput" placeholder="Имя пользователя">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <div class="auth-buttons">
                <button onclick="login()">Войти</button>
                <button onclick="showRegister()">Регистрация</button>
            </div>
            <button class="secondary" onclick="closeAuthModal()">Отмена</button>
        </div>
    </div>

    <!-- Модальное окно для регистрации -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>Регистрация</h2>
            <input type="text" id="newUsernameInput" placeholder="Имя пользователя">
            <input type="password" id="newPasswordInput" placeholder="Пароль">
            <div class="auth-buttons">
                <button onclick="register()">Зарегистрироваться</button>
                <button onclick="showLogin()">Вход</button>
            </div>
            <button class="secondary" onclick="closeAuthModal()">Отмена</button>
        </div>
    </div>

    <div class="container">
        <!-- Информация о пользователе -->
        <div class="user-info" id="userInfo" style="display: none;">
            <span id="usernameDisplay"></span>
            <button onclick="logout()">Выйти</button>
        </div>

        <h1>Учебный бот</h1>

        <div class="content-wrapper">
            <!-- Колонка с настройками -->
            <div class="role-column">
                <h3>Настройки</h3>
                <!-- Выбор предмета -->
                <div class="select-group">
                    <label for="subject">Предмет:</label>
                    <select id="subject" onchange="updateBotRole()">
                        <option value="математика">Математика</option>
                        <option value="русский язык">Русский язык</option>
                        <option value="физика">Физика</option>
                        <option value="химия">Химия</option>
                        <option value="биология">Биология</option>
                        <option value="история">История</option>
                        <option value="информатика">Информатика</option>
                        <option value="английский язык">Английский язык</option>
                    </select>
                </div>

                <!-- Выбор класса -->
                <div class="select-group">
                    <label for="grade">Класс:</label>
                    <select id="grade" onchange="updateBotRole()">
                        <option value="5">5 класс</option>
                        <option value="6">6 класс</option>
                        <option value="7">7 класс</option>
                        <option value="8">8 класс</option>
                        <option value="9">9 класс</option>
                        <option value="10">10 класс</option>
                        <option value="11">11 класс</option>
                    </select>
                </div>

                <!-- Скрытое поле для роли -->
                <textarea id="bot-role" style="display: none;">Ты — опытный учитель математики для 5 класса.
**Твоя задача:** помочь ученику разобраться в теме, которую он назовёт.

**Правила общения:**
1. **Сначала спроси ученика**, какую тему он хочет изучить.
   Пример: *"Какую тему по математике ты хочешь разобрать сегодня?"*

2. **Когда тема названа**, задавай уточняющие вопросы, чтобы понять уровень ученика.
   Пример: *"Ты уже знаешь, как складывать дроби, или нужно начать с основ?"*

3. **Объясняй тему по шагам**, используя простые примеры.
   Пример: *"Чтобы сложить дроби 1/8 и 3/8, нужно сложить числители: 1 + 3 = 4, а знаменатель оставить 8. Получается 4/8, что можно сократить до 1/2."*

4. **Добивайся понимания**, задавая наводящие вопросы.
   Пример: *"Как ты думаешь, почему здесь знаменатель не меняется?"*

5. **Если ученик не знает ответ**, давай подсказки, но не говори ответ сразу.
   Пример: *"Подсказка: вспомни, как складываются числители у дробей с одинаковым знаменателем."*

6. **Если ученик сдаётся**, объясни тему с нуля и проверь понимание.
   Пример: *"Давай разберём по шагам: 1) Складываем числители, 2) Знаменатель оставляем без изменений. Понятно?"*

7. **Дроби пиши в формате `a/b`** (например, `1/8`).
   Пример: *"Сложи дроби: 1/8 + 3/8."*

8. **Не имитируй диалог**, общайся напрямую с учеником.
   Пример: *"Ты понял, как это работает?"* (вместо *"Ученик: Да. Учитель: Отлично!"*)

**Сейчас ты ведёшь урок по предмету "математика" для 5 класса.**
</textarea>
            </div>

            <!-- Колонка с чатом -->
            <div class="chat-column">
                <div id="chat" class="chat"></div>
                <div class="input-area">
                    <input
                        type="text"
                        id="message"
                        placeholder="Введите сообщение..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="sendMessage()">Отправить</button>
                    <button onclick="clearChat()" style="background: #ff6b6b;">Очистить чат</button>
                </div>

                <!-- Блок с QR-кодом -->
                <div class="qr-section">
                    <img src="{{ url_for('static', filename='qr.png') }}" alt="QR-код" class="qr-code" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=QR'">
                    <p class="qr-caption">Попробуйте на своём устройстве</p>
                </div>

                <!-- Подсказка о командах -->
                <div class="commands-hint">
                    <p>💡 <strong>Подсказка:</strong> Попробуйте команды: <code>/help</code>, <code>/clear</code>, <code>/subject физика</code>, <code>/example квадратные уравнения</code></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script>
        // Проверяем авторизацию при загрузке страницы
        window.onload = function() {
            checkAuth();
        };

        // Проверяем, авторизован ли пользователь
        function checkAuth() {
            fetch("/check_auth")
                .then(response => response.json())
                .then(data => {
                    if (data.authenticated) {
                        document.getElementById('userInfo').style.display = 'flex';
                        document.getElementById('usernameDisplay').textContent = `Вы вошли как: ${data.username}`;
                        addWelcomeMessage();
                    } else {
                        showAuthModal();
                    }
                })
                .catch(error => {
                    console.error("Ошибка проверки авторизации:", error);
                    showAuthModal();
                });
        }

        // Показываем модальное окно авторизации
        function showAuthModal() {
            const modal = document.getElementById('authModal');
            modal.style.display = 'block';
        }

        // Показываем модальное окно регистрации
        function showRegister() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('registerModal').style.display = 'block';
        }

        // Показываем модальное окно входа
        function showLogin() {
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('authModal').style.display = 'block';
        }

        // Закрываем модальное окно
        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('registerModal').style.display = 'none';
        }

        // Регистрация нового пользователя
        function register() {
            const username = document.getElementById('newUsernameInput').value.trim();
            const password = document.getElementById('newPasswordInput').value.trim();

            if (!username || !password) {
                alert('Пожалуйста, заполните все поля.');
                return;
            }

            fetch("/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    alert('Регистрация успешна! Теперь вы можете войти.');
                    showLogin();
                }
            })
            .catch(error => {
                console.error("Ошибка регистрации:", error);
                alert("Произошла ошибка при регистрации.");
            });
        }

        // Вход пользователя
        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();

            if (!username || !password) {
                alert('Пожалуйста, заполните все поля.');
                return;
            }

            fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('usernameDisplay').textContent = `Вы вошли как: ${data.username}`;
                    closeAuthModal();
                    addWelcomeMessage();
                }
            })
            .catch(error => {
                console.error("Ошибка входа:", error);
                alert("Произошла ошибка при входе.");
            });
        }

        // Выход из аккаунта
        function logout() {
            fetch("/logout", { method: "POST" })
                .then(() => {
                    document.getElementById('userInfo').style.display = 'none';
                    showAuthModal();
                })
                .catch(error => {
                    console.error("Ошибка выхода:", error);
                });
        }

        // Функция для добавления приветственного сообщения
        function addWelcomeMessage() {
            const chat = document.getElementById("chat");
            chat.innerHTML += `
                <div class="teacher-message">
                    <b>Учитель:</b>
                    Добро пожаловать в универсального бота для обучения!
                    Напишите мне, какую тему вы хотите изучить.
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
            renderMathInElement(chat);
        }

        // Обновляем роль бота при изменении предмета/класса
        function updateBotRole() {
            const subject = document.getElementById("subject").value;
            const grade = document.getElementById("grade").value;
            const roleTextarea = document.getElementById("bot-role");

            const lines = roleTextarea.value.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes("Сейчас ты ведёшь урок по предмету")) {
                    lines[i] = `Сейчас ты ведёшь урок по предмету "${subject}" для ${grade} класса.`;
                    break;
                }
            }
            roleTextarea.value = lines.join('\n');
        }

        // Обработка нажатия Enter
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Функция для отправки сообщения
        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const message = messageInput.value.trim();
            if (!message) return;

            const botRole = document.getElementById("bot-role").value.trim();
            const chat = document.getElementById("chat");

            chat.innerHTML += `<div class="user-message"><b>Вы:</b> ${message}</div>`;
            messageInput.value = "";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        message: message,
                        role: botRole
                    })
                });

                const data = await response.json();
                if (data.error) {
                    chat.innerHTML += `<div class="teacher-message"><b>Ошибка:</b> ${data.error}</div>`;
                } else {
                    chat.innerHTML += `<div class="teacher-message"><b>Учитель:</b> ${data.answer}</div>`;
                    renderMathInElement(chat);
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<div class="teacher-message"><b>Ошибка:</b> ${error.message}</div>`;
            }
        }

        // Функция для очистки чата
        function clearChat() {
            const chat = document.getElementById("chat");
            chat.innerHTML = "";
            addWelcomeMessage();
        }
    </script>
</body>
</html>
