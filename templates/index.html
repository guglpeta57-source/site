<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учебный бот</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Модальное окно входа/регистрации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <div class="modal-tabs">
                <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" id="registerTabBtn" onclick="switchTab('register')">Регистрация</button>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button class="auth-submit" onclick="login()">Войти</button>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="password" id="regPassword" placeholder="Пароль">
                <button class="auth-submit" onclick="register()">Зарегистрироваться</button>
            </div>
            <button class="modal-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <div class="container">
        <div class="top-bar">
            <div id="userButton"></div>
        </div>
        <h1>Учебный бот</h1>

        <!-- Здесь можно оставить вашу существующую колонку с настройками и чат, но для простоты я оставлю только чат -->
        <div class="chat-container">
            <div id="chat" class="chat"></div>
            <div class="input-area">
                <input type="text" id="message" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Отправить</button>
                <button onclick="clearChat()" style="background: #ff6b6b;">Очистить чат</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = checkAuth;

        function checkAuth() {
            fetch('/check_auth')
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated) {
                        document.getElementById('userButton').innerHTML = `<button class="btn-user"><i class="fas fa-user"></i> ${data.username}</button>`;
                        addWelcomeMessage();
                    } else {
                        document.getElementById('userButton').innerHTML = `<button class="btn-guest" onclick="showModal()"><i class="fas fa-sign-in-alt"></i> Вход / Регистрация</button>`;
                    }
                });
        }

        function showModal() {
            document.getElementById('authModal').style.display = 'block';
            switchTab('login');
        }

        function closeModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function switchTab(tab) {
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            if (!username || !password) return alert('Заполните поля');

            fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert(data.error);
                else {
                    alert('Регистрация успешна! Теперь войдите.');
                    switchTab('login');
                }
            });
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) return alert('Заполните поля');

            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert(data.error);
                else {
                    closeModal();
                    checkAuth(); // обновим кнопку
                }
            });
        }

        function addWelcomeMessage() {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="teacher-message"><b>Учитель:</b> Добро пожаловать! Напишите мне, что хотите изучить.</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (!msg) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="user-message"><b>Вы:</b> ${msg}</div>`;
            input.value = '';

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                if (data.error) {
                    chat.innerHTML += `<div class="teacher-message"><b>Ошибка:</b> ${data.error}</div>`;
                } else {
                    chat.innerHTML += `<div class="teacher-message"><b>Учитель:</b> ${data.answer}</div>`;
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                chat.innerHTML += `<div class="teacher-message"><b>Ошибка:</b> ${err.message}</div>`;
            }
        }

        function clearChat() {
            document.getElementById('chat').innerHTML = '';
            addWelcomeMessage();
        }
    </script>
</body>
</html>
