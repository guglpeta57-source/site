<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учебный бот</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Подключаем KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js"
            onload="renderMathInElement(document.body);"></script>
    <!-- Стили для модального окна -->
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .modal button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .modal button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <!-- Модальное окно для пароля -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h2>Доступ ограничен</h2>
            <p>Пожалуйста, введите пароль:</p>
            <input type="password" id="passwordInput" placeholder="Введите пароль">
            <button onclick="checkPassword()">Войти</button>
        </div>
    </div>

    <div class="container">
        <h1>Учебный бот</h1>

        <div class="content-wrapper">
            <!-- Колонка с настройками -->
            <div class="role-column">
                <!-- Настройки -->
            </div>

            <!-- Колонка с чатом -->
            <div class="chat-column">
                <!-- Чат -->
            </div>
        </div>
    </div>

    <!-- Скрипт для пароля -->
    <script>
        // Пароль для доступа (замените на свой)
        const correctPassword = "12345";

        // Показываем модальное окно при загрузке страницы
        window.onload = function() {
            const modal = document.getElementById("passwordModal");
            modal.style.display = "block";
        };

        // Проверяем пароль
        function checkPassword() {
            const passwordInput = document.getElementById("passwordInput");
            const modal = document.getElementById("passwordModal");

            if (passwordInput.value === correctPassword) {
                modal.style.display = "none";
                addWelcomeMessage(); // Добавляем приветственное сообщение
            } else {
                alert("Неверный пароль! Попробуйте ещё раз.");
                passwordInput.value = "";
            }
        }

        // Функция для добавления приветственного сообщения
        function addWelcomeMessage() {
            const chat = document.getElementById("chat");
            chat.innerHTML += `
                <div class="teacher-message">
                    <b>Учитель:</b>
                    Добро пожаловать в универсального бота для обучения!
                    Напишите мне, какую тему вы хотите изучить.
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>

    <!-- Остальной код -->
</body>
</html>
